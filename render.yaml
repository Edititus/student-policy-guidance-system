services:
  - type: web
    name: backend
    env: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production

      - key: AI_PROVIDER
        value: huggingface

      - key: HF_GENERATION_MODEL
        value: Qwen/Qwen2.5-72B-Instruct

      - key: HUGGINGFACE_API_KEY
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
