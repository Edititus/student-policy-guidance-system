name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Build frontend
        run: npm run build --workspace=apps/frontend
      - name: Build backend
        run: npm run build --workspace=apps/backend
      - name: Run tests
        run: npm test --workspaces
